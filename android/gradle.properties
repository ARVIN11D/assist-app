# Increase JVM memory for Codemagic cloud build (Mac Mini M2 has 8GB RAM)
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX - all dependencies are already AndroidX, Jetifier not needed
android.useAndroidX=true
android.enableJetifier=false

# Suppress compile SDK warning
android.suppressUnsupportedCompileSdk=35

# Performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false
