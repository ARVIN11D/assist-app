name: assist
description: ASSIST – AI Personal Secretary App (Google Keep + ChatGPT + KhataBook)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Animations ─────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  fl_chart: ^0.68.0
  flutter_staggered_grid_view: ^0.7.0

  # ── State Management ─────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ───────────────────────────────────────────────────
  go_router: ^13.2.4

  # ── Local Database ───────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # ── Backend: Supabase ────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── AI: Gemini ───────────────────────────────────────────────────
  google_generative_ai: ^0.4.4

  # ── Voice ────────────────────────────────────────────────────────
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  permission_handler: ^11.3.1

  # ── Notifications & Alarms ───────────────────────────────────────
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # ── Biometric Auth ───────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Storage & Preferences ────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Utilities ────────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2

  # ── Icons ────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
