workflows:
  android-workflow:
    name: ASSIST Android APK
    max_build_duration: 60
    environment:
      flutter: 3.32.2
      java: 17
    scripts:
      - name: Flutter version info
        script: |
          flutter --version
          java -version
      - name: Get Flutter packages
        script: flutter pub get
      - name: Check Android setup
        script: |
          flutter doctor -v
          echo "NDK check:"
          ls $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo "No NDK dir"
      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -100
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - dr.arvindpotphode@gmail.com
        notify:
          success: true
          failure: true
